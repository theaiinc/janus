name: Build CLI release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to package"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            goos: linux
            goarch: amd64
            extension: ""
          - target: linux-arm64
            goos: linux
            goarch: arm64
            extension: ""
          - target: darwin-amd64
            goos: darwin
            goarch: amd64
            extension: ""
          - target: darwin-arm64
            goos: darwin
            goarch: arm64
            extension: ""
          - target: windows-amd64
            goos: windows
            goarch: amd64
            extension: ".exe"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          output="dist/janus-${{ matrix.target }}${{ matrix.extension }}"
          go build -trimpath -ldflags="-s -w" -o "$output" ./cmd/janus

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: janus-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download release binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* \
              --repo "${{ github.repository }}" \
              --clobber
          else
            gh release create "$RELEASE_TAG" dist/* \
              --repo "${{ github.repository }}" \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi
