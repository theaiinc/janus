name: Publish SDK packages

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish npm and Python packages
    environment: release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag && github.sha || github.event.release.tag_name || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up package tooling
        run: npm install --global npm@11.5.1

      - name: Verify repository and SDKs
        run: |
          npm test
          npm run test:js
          npm run test:python
          go vet ./...
          (cd sdk/npm/janus && npm pack --dry-run)
          (cd sdk/npm/janus-client && npm pack --dry-run)
          python -m pip install build
          python -m build sdk/python/janus --outdir dist/janus
          python -m build sdk/python/janus-client --outdir dist/janus-client

      - name: Publish @theaiinc/janus
        working-directory: sdk/npm/janus
        run: |
          version="$(node -p "require('./package.json').version")"
          if [ "$(npm view @theaiinc/janus@$version version 2>/dev/null || true)" = "$version" ]; then
            echo "@theaiinc/janus@$version is already published"
          else
            npm publish --access public
          fi

      - name: Publish @theaiinc/janus-client
        working-directory: sdk/npm/janus-client
        run: |
          version="$(node -p "require('./package.json').version")"
          if [ "$(npm view @theaiinc/janus-client@$version version 2>/dev/null || true)" = "$version" ]; then
            echo "@theaiinc/janus-client@$version is already published"
          else
            npm publish --access public
          fi

      - name: Publish theaiinc-janus
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/janus

      - name: Publish theaiinc-janus-client
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/janus-client
