name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Janus and SDKs
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm dependencies
        run: npm install --ignore-scripts

      - name: Run Go tests
        run: npm test

      - name: Run JavaScript SDK tests
        run: npm run test:js

      - name: Run Python SDK tests
        run: |
          python -m unittest discover -s sdk/python/janus-client/tests
          python -m unittest discover -s sdk/python/janus/tests

      - name: Run Go vet
        run: go vet ./...

      - name: Validate npm package
        run: |
          (cd sdk/npm/janus && npm pack --dry-run)
          (cd sdk/npm/janus-client && npm pack --dry-run)

      - name: Validate Python packages
        run: |
          python -m pip install build
          python -m build sdk/python/janus --outdir dist/janus
          python -m build sdk/python/janus-client --outdir dist/janus-client
